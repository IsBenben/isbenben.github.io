<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>搜索{{text_name}}{{type_name}} - Benben's Blog</title>
    <link rel="stylesheet" href="/index.css" />
    <script defer src="/index.js"></script>
    <meta name="description" content="标签搜索页面，展示{{type_name}}包含{{text_name}}的所有内容。{{text_description}}细致搜索Benben的个人技术博客。">
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="cae6367e-6ca5-4b1e-893e-96c54137a755"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="title-area">
        <h1><span>标签搜索 - Benben's Blog</span></h1>
        <nav class="links">
          <a href="/" class="return">返回首页</a>
        </nav>
      </div>

      <div class="tags-switcher">{{tags_switcher}}</div>
      <p class="search-description">显示{{type_name}}包含{{text_name}}的所有内容。</p>
      <div class="cards">{{cards}}</div>
    </div>
  </body>
</html>
